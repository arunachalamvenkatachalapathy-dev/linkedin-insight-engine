name: 🌿 Daily Environment & Nature LinkedIn Post

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate draft but do not publish)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run LinkedIn Post Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          STATE_FILE: data/state.json
        run: |
          python -m linkedin_insight_engine.main_draft

      - name: 💾 Commit updated state
        run: |
          git config user.name "linkedin-bot"
          git config user.email "bot@linkedin-insight-engine.local"
          git add data/state.json data/latest_image.* || true
          if git diff --staged --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "🤖 Update post history [$(date -u '+%Y-%m-%d')]"
            git push
          fi
