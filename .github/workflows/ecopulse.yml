name: EcoPulse Autonomous LinkedIn Poster

on:
  schedule:
    # 08:30 IST = 03:00 UTC. Runs Mon/Wed/Fri — adjust as needed.
    - cron: "0 3 * * 1,3,5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without publishing (preview only)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  run-ecopulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EcoPulse pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ECOPULSE_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/orchestrator.py

      - name: Commit updated state
        if: success()
        run: |
          git config user.name "ecopulse-bot"
          git config user.email "actions@github.com"
          git add state/posted_log.json
          git diff --cached --quiet || git commit -m "chore: update posted_log [skip ci]"
          git push
